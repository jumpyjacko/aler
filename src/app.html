<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    %sveltekit.head%


    <script>
        if (!("theme" in localStorage)) {
            if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                localStorage.theme = "dark";
            } else {
                localStorage.theme = "light";
            }
        }

        document.documentElement.classList.toggle(
            "dark",
            localStorage.theme === "dark" ||
            (!("theme" in localStorage) &&
                window.matchMedia("(prefers-color-scheme: dark)").matches),
        );
    </script>

    <meta name="description" content="alér | A pairwise media rating system." />
    <meta property="og:title" content="alér" />
    <meta property="og:description" content="A pairwise media rating system." />
    <meta proprety="og:url" content="https://jumpyjacko.github.io/aler" />
    <meta property="og:image" content="https://jumpyjacko.github.io/website-embed-image.png" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="alér" />
    <meta name="twitter:description" content="A pairwise media rating system." />
    <meta name="twitter:image" content="https://jumpyjacko.github.io/website-embed-image.png" />
</head>

<body data-sveltekit-preload-data="hover" class="font-inter bg-surface text-text transition-colors duration-100">
    <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
